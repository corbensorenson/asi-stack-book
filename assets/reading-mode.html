<script>
(function () {
  const storageKey = "asi-stack-reading-mode";
  const humanMode = "human";
  const aiMode = "ai";
  const modeCopy = {
    [aiMode]: {
      button: "AI view",
      status: "AI/research view active. Chapter status, guardrails, source crosswalks, proof hooks, and test plans are visible."
    },
    [humanMode]: {
      button: "Human view",
      status: "Human view active. Repeated live-research sections are hidden and Human Reading Path bridges are visible."
    }
  };
  const liveHeadings = new Set([
    "2:chapter status",
    "2:drafting guardrail",
    "2:codex test plan",
    "2:external literature queue",
    "2:source crosswalk",
    "2:claim labels",
    "2:why codex tests matter",
    "2:formalization hooks",
    "3:claim-source mapping status",
    "3:formalization hooks"
  ]);

  document.documentElement.setAttribute("data-asi-reading-mode", normalizeMode(savedMode()));

  function cleanHeadingText(heading) {
    const clone = heading.cloneNode(true);
    clone.querySelectorAll(".header-section-number, .anchorjs-link, .quarto-appendix-heading").forEach((node) => node.remove());
    return clone.textContent
      .replace(/\s+/g, " ")
      .replace(/^\d+(\.\d+)*\s+/, "")
      .trim()
      .toLowerCase();
  }

  function targetIdFromHash(value) {
    if (!value || !value.startsWith("#")) return "";
    try {
      return decodeURIComponent(value.slice(1));
    } catch (_) {
      return value.slice(1);
    }
  }

  function markLiveSections() {
    const liveIds = new Set();
    document.querySelectorAll("section").forEach((section) => {
      const heading = Array.from(section.children).find((child) => /^H[1-6]$/.test(child.tagName));
      if (!heading) return;
      const level = Number(heading.tagName.slice(1));
      const key = `${level}:${cleanHeadingText(heading)}`;
      if (liveHeadings.has(key)) {
        section.setAttribute("data-asi-live-section", "true");
        if (section.id) liveIds.add(section.id);
        const anchorId = heading.getAttribute("data-anchor-id") || heading.id;
        if (anchorId) liveIds.add(anchorId);
      }
    });
    return liveIds;
  }

  function markLiveTocLinks(liveIds) {
    document.querySelectorAll('#TOC a[href^="#"], #TOC a[data-scroll-target^="#"]').forEach((link) => {
      const targetId = targetIdFromHash(link.getAttribute("data-scroll-target") || link.getAttribute("href") || "");
      if (!liveIds.has(targetId)) return;
      const item = link.closest("li") || link;
      item.setAttribute("data-asi-live-toc-link", "true");
    });
  }

  function normalizeMode(mode) {
    return mode === humanMode ? humanMode : aiMode;
  }

  function setMode(mode) {
    const nextMode = normalizeMode(mode);
    document.documentElement.setAttribute("data-asi-reading-mode", nextMode);
    try {
      window.localStorage.setItem(storageKey, nextMode);
    } catch (_) {
      /* localStorage may be disabled; the page-level state still applies. */
    }
    document.querySelectorAll("[data-asi-reading-choice]").forEach((button) => {
      const active = button.getAttribute("data-asi-reading-choice") === nextMode;
      button.setAttribute("aria-pressed", active ? "true" : "false");
      const copy = modeCopy[button.getAttribute("data-asi-reading-choice")] || modeCopy[aiMode];
      button.setAttribute("aria-label", active ? `${copy.button} active` : `Switch to ${copy.button}`);
    });
    const status = document.querySelector("[data-asi-reading-mode-status]");
    if (status) {
      status.textContent = modeCopy[nextMode].status;
    }
  }

  function savedMode() {
    try {
      return window.localStorage.getItem(storageKey) || aiMode;
    } catch (_) {
      return aiMode;
    }
  }

  function insertToggle() {
    const target = document.querySelector("header#title-block-header") || document.querySelector("main.content") || document.querySelector("#quarto-document-content") || document.body;
    const control = document.createElement("div");
    control.className = "asi-reading-mode";
    control.setAttribute("role", "group");
    control.setAttribute("aria-label", "Reading mode");
    control.setAttribute("aria-describedby", "asi-reading-mode-description");
    control.innerHTML = [
      '<span class="asi-reading-mode__label">Reading mode</span>',
      '<span id="asi-reading-mode-description" class="asi-sr-only">AI view shows the full live research scaffold. Human view hides repeated workflow sections and shows chapter Human Reading Path bridges.</span>',
      '<button type="button" data-asi-reading-choice="ai" aria-pressed="true" title="Show the full AI and researcher scaffold">AI view</button>',
      '<button type="button" data-asi-reading-choice="human" aria-pressed="false" title="Read the human-facing chapter prose">Human view</button>',
      '<span class="asi-sr-only" role="status" aria-live="polite" data-asi-reading-mode-status></span>'
    ].join("");
    control.querySelectorAll("button").forEach((button) => {
      button.addEventListener("click", () => setMode(button.getAttribute("data-asi-reading-choice")));
    });
    if (target.matches && target.matches("header#title-block-header")) {
      target.insertAdjacentElement("afterend", control);
    } else {
      target.prepend(control);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    const liveIds = markLiveSections();
    markLiveTocLinks(liveIds);
    insertToggle();
    setMode(savedMode());
  });
})();
</script>
