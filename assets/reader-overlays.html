      "content": "The mechanism is a trace kernel for the stack. A request enters with a human purpose and a limited authority grant. Each layer then emits something durable enough for the next layer to inspect: a command contract, plan, context packet, route decision, claim envelope, work order, audit log, evidence update, or improvement decision.\n\nThe point is not to make every layer run inside one agent loop. The point is to prevent the layers from dissolving into hidden prompt state. Planning should not silently become verification. Memory should not silently become authority. Execution should not silently forgive a failed residual. Evidence should not silently promote a result whose support boundary is still only architectural argument.\n\n```{mermaid}\nflowchart LR\nA[\"Human intent\"] --> B[\"Governed command\"]\nB --> C[\"Plan and context\"]\nC --> D[\"Route and verification\"]\nD --> E[\"Work order and audit\"]\nE --> F[\"Evidence update\"]\nF --> G[\"SCF decision\"]\nG -- \"insufficient authority or evidence\" --> H[\"Blocked, narrowed, or reviewed\"]\nG -- \"accepted narrow result\" --> I[\"Bounded continuation\"]\n```\n\nThe current repository has a modest version of that shape. It has deterministic reference-trace fixtures: one approved maintenance flow and one blocked authority flow. The approved flow carries stable parent artifacts from intent through plan, context, route, work order, audit log, evidence update, and SCF no-promotion review. The blocked flow follows the same spine but stops because runtime execution authority is missing and governance review is required.\n\nA first local command replay now sits beside those fixtures through the Resource flagship lane. That replay records a command, output digest, artifact bundle, validation path, and blocked-path reference. It is useful because it shows that the record family can carry a real local command result, not only a hand-written example.\n\nThe boundary remains strict. These records do not prove a deployed runtime, live artifact-continuity service, authority-stop enforcement outside the fixture, model quality, benchmark quality, scheduler behavior, economic outcome, or support-state promotion. They show the shape of accountable integration: parentage, authority deltas, evidence deltas, residual deltas, validation commands, stop conditions, source references, and non-claims survive the handoff.\n\nThat is the integration test the rest of the stack has to meet. A future implementation can be impressive only after it produces comparable traces under both success and refusal. If parentage disappears, authority becomes ambient, evidence changes without a named claim, or residuals are erased, the architecture has not composed yet.",
      "rationale": "Replace the dense generated-reader mechanism and fixture-trace inventory with a clearer reader trace-kernel explanation while preserving fixture-only, local-replay, blocked-path, and no-promotion boundaries."
    },
    {
      "id": "v1_0.intent_execution.validation_states_reader_replace",
      "target_file": "chapters/intent-to-execution-contracts.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Command contract validation states",
        "aliases": []
      },
      "content": "Command contracts move through pre-execution validation states. A draft contract is still being extracted or normalized, so it cannot dispatch planning work. A field-complete contract has the required slots, but those slots may still contain inferred or defaulted values, so it is ready for validation and review rather than execution.\n\nIf context, examples, hidden instructions, or fields conflict with explicit constraints, the contract enters conflict-detected state and should produce a residual or clarification. If a means, tool, disclosure, publication, or other effect was inferred rather than granted, the contract is authority-inferred and must stay draft-only or be re-contracted.\n\nDispatch is blocked when required output, verification, failure, approval, or authority fields are missing or vague. A contract becomes validated for planning only after required fields are concrete and precedence review passes. If a newer contract replaces it, the old contract becomes a historical trace rather than active permission.\n\nThese states do not say the work is correct. They only say whether the command is clear enough to become planning input.",
      "rationale": "Replace the command-contract validation-state table with reader prose while preserving the canonical AI/research state matrix."
    },
    {
      "id": "v1_0.intent_execution.interfaces_reader_replace",
      "target_file": "chapters/intent-to-execution-contracts.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Interfaces",
        "aliases": []
      },
      "content": "Command semantics are carried by the Command Contract. The record keeps the operational pieces together: contract identity, intent link, validation state, role, objective, context references, field provenance, field confidence, constraints, procedure, allowed and forbidden means, bounded defaults, output contract, verification, failure behavior, authority ceiling, authority basis, approvals, expected artifacts, feedback route, re-contract points, dispatch blockers, and non-claims.\n\nThe interface is narrower than natural language on purpose. The raw request can stay attached for review, but the structured fields control dispatch. Planning consumes the command. Execution enforces allowed means and output contracts. Verification checks declared criteria and failure behavior. Evidence records which fields were satisfied, repaired, escalated, or left residual.\n\nEach field also carries status. Confirmed fields may support planning because they were explicitly stated or accepted by the relevant boundary. Policy-imposed fields can constrain planning but cannot broaden authority. Source-derived fields may support context or requirements only within the source's limits. Defaulted fields need a scope and a re-contract trigger. Inferred fields can help a draft, but they cannot authorize side effects. Missing required fields block dispatch or narrow the response to clarification.\n\nThat metadata keeps confidence from becoming hidden evidence. A field can be useful and still too weak to authorize work.",
      "rationale": "Turn the command-contract field and field-status tables into reader prose without changing the canonical interface vocabulary."
    },
    {
      "id": "v1_0.labor_os.lifecycle_states_reader_replace",
      "target_file": "chapters/labor-os-and-typed-jobs.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Typed job lifecycle states",
        "aliases": []
      },
      "content": "Typed jobs use lifecycle states so work cannot slide from idea to side effect without review. A drafted job is only a packet proposal; it cannot dispatch. A locked job has fixed contract, parentage, expected artifact, and failure behavior, so it can enter permission review. If approval is missing or stale, the job waits. If approval is present and scoped, it may become dispatchable once permissions, inputs, and adapter requirements also pass.\n\nRunning is not completion. A running job must emit audit events. When output exists, the job enters adjudication until verification, review, or acceptance is complete. A delivered job has returned or exposed a useful artifact, but that still does not make it evidence-ready.\n\nEvidence readiness requires the required artifact capture, verification, audit, residual, and replay or non-replay fields to exist. Failed or blocked jobs need residuals and recovery paths. Quarantined jobs had unauthorized effects, missing provenance, or unsafe behavior and cannot support promotion. Replayed or retired jobs become historical trace unless they are requalified.\n\nThe distinction between delivered and evidence-ready is central. Delivery satisfies a user-facing workflow; evidence readiness satisfies the living stack.",
      "rationale": "Replace the typed-job lifecycle-state table with reader prose while preserving the canonical AI/research state matrix."
    },
    {
      "id": "v1_0.living_book_methodology.interfaces_reader_replace",
      "target_file": "chapters/living-book-methodology.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Interfaces",
        "aliases": []
      },
      "content": "The methodology speaks through release records. A release record tells a future reader which source commit was rendered, which audience profile it served, which validations ran, which changelog entry describes the change, which public URL or local output exists, which derivatives were produced, and which residuals remain.\n\nReader editions use the same discipline. A profile may say that EPUB, DOCX, PDF, or audio is a target, but a target is not an artifact. A generated file is not approved merely because it exists. A released reader artifact needs its own source commit, strip policy, review state, accessibility notes, residuals, and non-claims.\n\nThat separation keeps publication from masquerading as evidence. A successful Pages build can prove that the site rendered. It cannot prove that a chapter claim is true. A reader manuscript can improve pacing and continuity. It cannot change support states, source boundaries, proof status, or implementation horizons. The interface exists so every audience can see what kind of authority it is holding.",
      "rationale": "Replace the generated-reader publication-interface inventory with prose that preserves release-record, reader-derivative, and no-publication-as-proof boundaries."
    },
    {
      "id": "v1_0.living_book_methodology.minimum_viable_reader_replace",
      "target_file": "chapters/living-book-methodology.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The minimum viable version is the public repository itself operating under rules. The manifest gives chapters stable addresses. The outline records drafting intent and proof targets. Source notes show what has been read. Appendix C records claim state. The changelog records meaningful movement. Local validation and Quarto render checks keep the public site from drifting away from the source.\n\nThe current implementation also has a first executable change-packet boundary. Synthetic packets can show whether a public-surface change carried validation, changelog, audience, derivative, support-state, residual, and non-claim receipts. Expected-invalid packets reject missing receipts, equal-authority reader derivatives, and support promotion without evidence-transition references.\n\nThat is useful release hygiene, not a quality certificate. It does not prove source interpretation, editorial completeness, future-agent judgment, reader release approval, audio production, or the truth of any architecture claim. It only shows that the book can make some maintenance and publication mistakes harder to hide.",
      "rationale": "Replace the generated-reader implementation inventory with prose that names the current living-book repo and change-packet boundary without overclaiming manuscript quality or artifact approval."
    },
    {
      "id": "v1_0.living_book_methodology.beyond_state_reader_replace",
      "target_file": "chapters/living-book-methodology.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Beyond the State of the Art",
        "aliases": []
      },
      "content": "The endpoint is a research operating system that happens to render as a book. The live site remains the AI-readable and researcher-auditable source. Human view, reader manuscripts, ebook formats, and future audio scripts are derived projections with their own review state instead of rival sources of truth.\n\nAt that maturity, adding a new AI paper would be a governed build event. The system would ingest the public-safe source, decide whether it updates an existing chapter or creates a precise new one, revise the manifest and outline, update source notes and claim mappings, generate proof or test backlog, render the live site, and prepare reader editions without hand-renumbering or hidden support-state movement.\n\nThe mature workflow would also know how to refuse. A missing source note would block source-derived support. A failed validator would block release. A reader edition could improve prose while leaving claim authority unchanged. A polished artifact could be enjoyable without becoming evidence for the architecture.\n\nThe book has not demonstrated that full operating system yet. It has a strong scaffold, tracked deltas, release records, and synthetic change-packet checks. Stronger claims require repeated real source ingestions, reader-edition releases, artifact reviews, evidence transitions, and failed-change records showing that continuous improvement preserved the audit trail under pressure.",
      "rationale": "Replace the dense target research-OS checklist with reader prose while preserving tri-audience, ingestion, release, and non-claim boundaries."
    },
    {
      "id": "v1_0.mathematical_substrates.adoption_lanes_reader_replace",
      "target_file": "chapters/mathematical-and-search-substrates.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Adoption packet lanes",
        "aliases": []
      },
      "content": "The adoption packet has four lanes because a substrate can be real in one sense and still unready in another. The structural lane asks what fact, proof receipt, or deterministic fixture exists. If the theorem is missing, the receipt is unresolved, or the model does not match the intended use, that lane blocks promotion even if the idea is mathematically attractive.\n\nThe empirical lane asks for the workload, metric, baseline, negative control, and report. Without workload evidence or with failed controls, the substrate stays exploratory or becomes a recorded negative result. The consumer lane asks which downstream use may rely on the record; a consumer cannot borrow an axis the record does not support.\n\nThe retirement lane is what keeps optionality honest. It names the result that would narrow, supersede, or retire the substrate, so a hidden negative result cannot quietly become architectural commitment. Together these lanes let the stack keep unusual mathematics available while refusing to turn elegance into permission.",
      "rationale": "Replace the substrate-adoption lane table with reader prose while preserving the canonical AI/research promotion-blocker matrix."
    },
    {
      "id": "v1_0.personal_compute_hives.mechanism_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Mechanism",
        "aliases": []
      },
      "content": "A personal compute hive begins with a plain question: which owned or rented machine is allowed to do this particular work? The answer should come from records, not vibes. A device card says what a phone, laptop, GPU desktop, NAS, workshop computer, old machine, project runner, or rented node can do and what it may touch. A job contract says what work is being requested, which data and tools are in scope, what risk tier applies, what budget and deadline matter, and what evidence must return.\n\nThe scheduler first rejects unlawful placements. It should remove nodes that cannot see the data, cannot hold the tool authority, lack the required sandbox, exceed the budget, need unavailable human approval, or would move private context into an unacceptable place. Only after that policy filter does optimization begin. Speed, locality, cost, energy, and capacity matter, but they do not outrank consent, data class, tool risk, or revocation.\n\n```{mermaid}\nflowchart LR\n  contract[\"Job contract\"] --> policy[\"Policy filter\"]\n  policy -- \"denied\" --> rejected[\"Rejected nodes with reasons\"]\n  policy -- \"eligible\" --> bids[\"Node bids\"]\n  bids --> decision[\"Scheduling decision\"]\n  decision --> approval[\"Scoped approval when needed\"]\n  approval --> evidence[\"Artifact, audit, residual, revocation\"]\n```\n\nApproval remains scoped. A phone can approve a job for a desktop GPU, but that approval names one job boundary and one time window. A federation lease can let a project or rented node borrow capacity, but it should not inherit the private network, secrets, or memory of the person who owns the hive. The result of a job is not just an output; it is an artifact, audit trail, residual record, and revocation update.\n\nThe partitioned authority case makes the rule sharper. If a revocation, lease update, or narrowed grant has not reached a worker, the system should not treat the worker's stale local state as current permission. Protected effects should wait for a fresh authority receipt, quarantine, or preserve no-mutation evidence. The current repository validates that boundary only as finite record discipline, not as a live network or scheduler result. That boundary keeps local autonomy from becoming silent distributed permission.",
      "rationale": "Condense the AI/research mechanism inventory for the human reader while preserving the scheduler, approval, evidence, and partitioned-authority boundaries."
    },
    {
      "id": "v1_0.personal_compute_hives.owned_substrate_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Owned substrate and device roles",
        "aliases": []
      },
      "content": "The hive starts by refusing to flatten devices into one pool of interchangeable compute. The phone is usually the identity surface, approval point, camera, microphone, and notification loop. The laptop is the mobile workbench where interactive writing, coding, review, and local file operations make sense. A desktop or GPU machine is a stronger worker, but that strength does not make it automatically safe for every family record, credential, or private dataset.\n\nStorage has its own role. A NAS or local server can hold durable memory, backups, artifacts, indexes, and source corpora, but it should not become a place where arbitrary internet-facing code runs just because it is always on. Older machines can still be useful for indexing, crawling, low-priority transforms, and test runs, yet patch state, sandboxing, and trust tier should limit what they receive. Tablets, TVs, browsers, and headsets are more like shared portals than private workers, so room context and audience matter as much as hardware capability.\n\nThe same separation applies outside the household. A workshop computer may connect to physical tools, sensors, CAD/CAM surfaces, robotics, or fabrication flows; its operator-presence rule should be stricter than a document summarizer. Rented or public nodes can absorb public tests, synthetic workloads, burst inference, or scrubbed jobs, but private memory and secrets need a stronger exposure contract before they cross that boundary.\n\nA phone can approve a job that runs on a desktop. A NAS can hold the source corpus without executing untrusted code. A rented GPU can process public work while being forbidden from private memory. A family tablet can be a learning portal without becoming a surveillance device. The important distinction is not hardware type by itself; it is role, owner, audience, data class, tool class, and revocation path.",
      "rationale": "Replace the table-heavy device-role section with human-reader prose while keeping the canonical AI/research table in the live source."
    },
    {
      "id": "v1_0.personal_compute_hives.hive_objects_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Hive objects",
        "aliases": []
      },
      "content": "The first useful hive records are small enough to understand without treating the system like a distributed-operating-system manual. A `DeviceResourceCard` says what a node is, who owns or guards it, where it sits, what it can compute or store, what network shape it exposes, what data and tools it may touch, whether it can hold secret handles, when an operator must be present, and how it can be revoked.\n\nA `PortalCard` describes a human-facing surface. It records the person or guardian in scope, the input and output modes, the authority level, the privacy context, the attention state, the safe output profile, and the revocation path. That card keeps a phone, browser, headset, shared screen, or family tablet from being mistaken for the whole AI or for the owner's full authority.\n\nA `HiveJobContract` describes the work boundary before any node bids. It names the objective, source context references, data classes, tool classes, authority ceiling, risk tier, federation scope, budget, deadline, verification predicate, and residual policy. Once the contract exists, eligible nodes can answer with `HiveJobBid` records: latency, cost, energy, transfer estimate, thermal risk, interruption risk, privacy fit, capability fit, and policy reason.\n\nThe actual placement decision is a separate record. A `HiveSchedulingDecision` lists eligible nodes, rejected nodes, rejection reasons, selected node, approvals, data placement, cost and energy estimates, isolation mode, evidence references, and expiration. A `HiveApprovalReceipt` binds one human or guardian decision to one job boundary and time window. A `HiveFederationLease` lets another person, project, rented node, or public market borrow bounded capacity without inheriting private network access.\n\nThese objects do not prove that the hive works. They make the first implementation inspectable: what asked for work, which devices were rejected, who approved the boundary, where data moved, what evidence came back, and how the permission ends.",
      "rationale": "Turn the object catalog table into prose for the relaxed reader path without removing the record vocabulary from the AI/research source."
    },
    {
      "id": "v1_0.personal_compute_hives.job_classes_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Job classes and federation modes",
        "aliases": []
      },
      "content": "Hive scheduling should classify work before it asks any device to bid. Some work is local and harmless: a small transform, a note cleanup, or a local review that touches no private memory, physical tool, credential, or spend. Some work is personal and private, which pushes it toward trusted local nodes and away from rented compute. Family-sensitive work adds dignity, role, and guardian boundaries; the route has to preserve the person in front of the portal, not merely satisfy a logging rule.\n\nHigh-compute work is not automatically cloud work. A desktop GPU, site node, or rented machine may be appropriate only after the data class, privacy exposure, cost, and verification need are clear. External project work should land in a disposable sandbox with no private network and no standing credentials, returning an artifact bundle instead of a durable foothold. Physical-world work needs operator presence and an approval receipt because the failure can leave the screen. Dangerous or irreversible work should default to denial or multi-party review, not ordinary autonomous execution.\n\nFederation mode changes the lease. A personal hive uses one person's devices. A family hive separates shared and private zones. A site hive binds a home, office, workshop, or lab. A joined private hive lets collaborators contribute under contract. A public project hive accepts bounded issue, benchmark, documentation, or test jobs. A market hive exposes spare capacity for payment or credit. An emergency hive prioritizes continuity when ordinary internet paths fail.\n\nThe common rule is that reachability never decides the route alone. Every class and federation mode changes what data may move, which tools may run, who must approve, what evidence must return, and how quickly the lease expires.",
      "rationale": "Replace the job-class table with narrative policy prose for the human reader while preserving the live/research taxonomy."
    },
    {
      "id": "v1_0.personal_compute_hives.hive_memory_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Hive memory",
        "aliases": []
      },
      "content": "A hive is also a memory topology. Artifact memory holds documents, code, diagrams, builds, logs, and release bundles; it needs provenance, backup policy, and a durable store. Episodic memory holds meetings, sessions, approvals, and task events; it needs scoped retention and owner-visible review. Semantic memory holds concepts, source notes, embeddings, and claim references; it should stay source-bound and revocable through VCM rather than becoming an unowned vector swamp.\n\nProcedural memory is different again. Repeated workflows compiled into tools need tests, preconditions, postconditions, retirement rules, and failure evidence. Device memory records benchmarks, thermal history, reliability, and dropout events so the scheduler can make better placement decisions, but that history must not expand a node's authority. Trust memory tracks safe or unsafe behavior by nodes, projects, workers, or providers; it should be evidence-linked, contestable, and decay-aware rather than permanent reputation folklore.\n\nFamily and project memory require the sharpest boundary. Family memory may include learning context, guardian decisions, shared household records, or sensitive events, so dignity, role scope, and minimal logging matter more than convenience. Project memory belongs to issues, pull requests, contracts, CI logs, releases, steward decisions, and artifact bundles; it should remain artifact-bound and auditable.\n\nTreating all of these memories as one store erases the point of a hive. VCM decides what context is needed and which source or taint labels travel with it. The hive decides where that context may exist, which device can materialize it, who can inspect it, and how it can be revoked.",
      "rationale": "Turn the memory topology table into reader prose so the human edition keeps the conceptual distinction without carrying dense matrix formatting."
    },
    {
      "id": "v1_0.personal_compute_hives.beyond_state_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Beyond the State of the Art",
        "aliases": []
      },
      "content": "A mature personal compute hive would be an owned compute fabric for a person, family, project, or temporary federation. It would let work run near the right data and device without treating reachability as authority, convenience as consent, or cheap rented compute as a reason to move private context.\n\nThe fabric would classify jobs before scheduling them. Data sensitivity, tool authority, physical-world risk, federation scope, cost, energy, and verification requirements would shape which phones, laptops, dashboards, local GPUs, NAS boxes, old machines, workshop computers, project runners, or rented nodes may even bid. Policy filtering would happen before optimization, and approval receipts would bind sensitive work to a specific person, boundary, and time window.\n\nThe Hive-to-Hive protocol would keep identities, device roles, portal roles, worker capabilities, sandbox rules, artifact manifests, evidence bundles, payments or credits, reputation records, revocations, and memory classes separate. Artifact stewards could request work, but the hive would govern whether that work is lawful for its devices, data, family roles, budget, and physical environment.\n\nThe endpoint remains architectural. Hive support stays at `argument` until node inventories, policy-first scheduler traces, privacy and offline-mode tests, energy and budget records, contribution ledgers, and portal-continuity checks show that owned edge compute can join the stack without becoming an unmanaged compute swarm.",
      "rationale": "Replace the dense hive target-architecture checklist with reader prose while preserving the canonical AI/research protocol surface."
    },
    {
      "id": "v1_0.personal_compute_hives.minimum_viable_reader_replace",
      "target_file": "chapters/personal-compute-hives-and-federated-edge-intelligence.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The first hive should be deliberately small: a local dashboard, signed device cards, portal cards, a typed job queue, policy-first rejection before scoring, approval receipts for sensitive boundaries, and an artifact log that records decisions, outputs, residuals, and revocations.\n\nFederation can exist in the record model before it is enabled. The minimum should not include public federation, autonomous spending, private-data rented-node execution, or background operation across family devices without explicit enrollment.\n\nThis repository has the record-shape starting point for that experiment: schemas and valid fixtures for device resource cards, portal cards, hive job contracts, bids, scheduling decisions, approval receipts, and federation leases. Those fixtures prove only that the public records validate locally. They do not prove that a hive scheduler exists or that edge execution is safe.",
      "rationale": "Replace the checklist-shaped minimum hive implementation with concise reader prose while preserving the canonical AI/research implementation ladder."
    },
    {
      "id": "v1_0.planning_control.node_lifecycle_reader_replace",
      "target_file": "chapters/planning-as-a-control-layer.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Plan node lifecycle states",
        "aliases": []
      },
      "content": "Plan nodes move through lifecycle states so a useful idea does not become execution authority by accident. Proposed nodes are decomposition candidates only. Nodes blocked on context need missing material or a narrower scope. Nodes blocked on authority need a new contract, approval route, or refusal. Nodes blocked on dependency wait for upstream work, and nodes blocked on verification need a success predicate before they can be dispatched.\n\nA dispatchable node is different from a plausible node: its constraints, context, authority, dependencies, and verification plan are all satisfied. Only then may it lower into a typed job. Once dispatched, it must preserve job parentage so later audit can trace the action back to the accepted command and plan node.\n\nReplanned nodes record what changed after feedback while keeping the original authority and stop-condition boundaries visible. Stopped nodes preserve the reason work ended, whether denial, budget exhaustion, risk, or a triggered stop condition. These states let the plan remain useful before execution and accountable after execution.\n\nThe reader-level point is simple: the graph can contain many kinds of work, but only a narrow subset is authorized work.",
      "rationale": "Replace the plan-node lifecycle-state table with reader prose while preserving the canonical AI/research state matrix."
    },
    {
      "id": "v1_0.policy_optimization.method_families_reader_replace",
      "target_file": "chapters/policy-optimization-and-learning-from-feedback.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Method families",
        "aliases": []
      },
      "content": "The external method families matter, but the reader version should not turn this section into an acronym ledger. Foundational policy-gradient methods provide the minimal reward-learning substrate: REINFORCE-style estimators, baselines, RLOO, and ReMax-like critic-light simplifications. Trust-region and clipped online RL methods such as TRPO, PPO, PPO-RLHF, GRPO, DAPO, and GSPO add bounded online exploration and update-size discipline. Offline preference methods such as DPO, IPO, ORPO, KTO, and SimPO use static preference or binary-feedback data when online rollout is not the right first move.\n\nVerifier-based RL and RLVR sit closer to the ASI Stack's evidence machinery because they can learn from exact checks, process checks, tool results, context-grounding checks, governance checks, or efficiency verifiers. Reasoning-budget and latency-aware RL ask when to think longer, stop, retrieve, verify, use tools, or switch generation modes. Control-policy RL is broader: it can target planner decomposition, router choice, VCM retrieval, execution policy, verifier escalation, or generation-mode selection rather than only answer style.\n\nThe architectural rule is that the target policy should be named before the optimizer is named. A planner reward cannot erase constraints, approvals, or residuals. A VCM reward for compact context is not valid unless evidence adequacy is preserved. A router reward for lower cost cannot bypass readiness, authority, or residual escrow. A generator reward for fluency or concision is not evidence without verifier support. A verifier reward has to be audited for gaming and coverage gaps. Tool success cannot expand the authority envelope, governance rewards must preserve rights and rollback, and speed is useful only when accepted-output quality and fallback are recorded.\n\nTraining mode follows feedback and risk. SFT is appropriate when high-quality demonstrations exist, but imitation does not explore better policies. Preference optimization is useful when static feedback is available, but preference quality becomes a dependency. PPO-style online RL is for rollout and reward optimization, with critic cost, tuning sensitivity, and reward-model risk made explicit. Group-relative or critic-light methods need reliable contrast. Long-sequence variants may fit reasoning or MoE-specific training, but their literature moves quickly and reproduction risk is higher. RLVR works only when the verifier is good enough for the job. Control-policy RL needs system-level reward design and authority-aware evaluation.",
      "rationale": "Replace three dense method-family tables with reader prose while keeping the canonical AI/research comparison tables in the live source."
    },
    {
      "id": "v1_0.policy_optimization.external_literature_reader_replace",
      "target_file": "chapters/policy-optimization-and-learning-from-feedback.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "source-reviewed external literature",
        "aliases": [
          "Source-noted external literature"
        ]
      },
      "content": "These external records are method-family context, not reproduced ASI Stack results. TRPO and PPO supply the trust-region and proximal-update background for bounded online policy movement. ReMax and REINFORCE-style RLHF show why simpler or critic-light baselines still matter when a system is tempted to treat a PPO-heavy pipeline as the only serious reinforcement-learning route.\n\nDPO, IPO, ORPO, KTO, and SimPO supply the offline preference-optimization family: useful when static preference, binary feedback, reference-model, or sequence-reward assumptions match the available data. DeepSeek-R1, DAPO, GSPO, and S-GRPO provide reasoning-RL and sequence-level context, including reproducibility pressure and overthinking control. LongRLVR connects verifier rewards to long-context grounding, which is why it belongs next to VCM and context adequacy rather than only next to model training.\n\nThe RLHF-limitations source is the warning layer. It feeds reward-hacking probes, evaluator-limit cautions, disclosure needs, and audit requirements. None of these source-reviewed records means that this repository has trained a policy, validated a reward model, reproduced a reasoning-RL result, solved reward hacking, or moved the governing claim above `argument` support.",
      "rationale": "Replace the external-literature table with prose while preserving the source-note/source-review boundary and local non-reproduction caveat."
    },
    {
      "id": "v1_0.project_theseus.minimum_viable_reader_replace",
      "target_file": "chapters/project-theseus-as-report-first-implementation-reference.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The smallest useful Theseus lane is a public-safe crosswalk from one ASI Stack layer to one Theseus report surface. It has to say which run or summary is being discussed, which material is safe to publish, which pieces are absent, and which claims remain out of bounds.\n\nThe repository now has that narrow shape. It includes a crosswalk example, two static report imports, a support replay over the ASI-side checks, a report-bundle audit, and a bounded public task-bundle summary. Together they show how a prototype can be treated as an implementation reference without turning private or historical status into public proof.\n\nThe new task-bundle summary keeps the most important reader facts in the spine: 64 public BigCodeBench metadata-only tasks, 0 public training rows, 0 task-level regressions, visible gaps, and clean live Theseus replay remains unclaimed. The detailed gate counts, candidate counts, digests, and invalid-control names belong in the AI/research view and companion note.\n\nThis is the whole point of the minimum viable lane. A useful report-first system should preserve the negative rows as carefully as the successful ones. Missing artifacts, dirty checkout state, private payload boundaries, and unsupported promotions are not narrative inconveniences; they are the evidence boundary that keeps a prototype from becoming an overclaim.\n\nThe next stronger step is not better wording. It is a fresh replay or archived public release package with environment notes, publication permission, artifact digests, and review boundaries. Until then, Theseus remains implementation-reference evidence, not model-quality, benchmark-superiority, generation-speed, useful-solution-per-second, support-state, or chapter-core-promotion evidence.",
      "rationale": "Replace validator-dense Project Theseus import prose in the reader projection while preserving clean-replay, model-quality, speed, and support-state boundaries."
    },
    {
      "id": "v1_0.rankfold.source_support_reader_replace",
      "target_file": "chapters/rankfold-neuralfold-and-artifact-compression.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Source support boundaries",
        "aliases": []
      },
      "content": "The source lineage remains useful but bounded. `rankfold_neuralfold` supplies the tensor-centric archive framing, per-artifact optimization, low-rank residual transforms, manifests, codec parameters, deterministic decode obligations, and reconstruction-check vocabulary. `rankfold_compressor` preserves vector-pair, factorized, adaptive-rank, entropy-aware, recursive-cascade, metrics, and CLI lineage. `bbvca_v9` contributes reconstruction contracts, exact repairs, bounded verification, fallback, and proxy-versus-final-rate discipline. `cgs` contributes compact seeds, generated structure, residual channels, verification contracts, and hidden-complexity accounting. `bugbrain` keeps edge-efficiency and local-resource pressure visible. None of these sources should be read as a local compression ratio, codec-correctness result, downstream-utility result, or support-state promotion.",
      "rationale": "Replace the generated-reader source-support table with prose while preserving source-lineage boundaries and non-claims without disturbing the live Core Claim marker pipeline."
    },
    {
      "id": "v1_0.rankfold.artifact_compression_states_reader_replace",
      "target_file": "chapters/rankfold-neuralfold-and-artifact-compression.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Artifact-compression states",
        "aliases": []
      },
      "content": "A compressed artifact should enter the system through an admission state, not through enthusiasm about a smaller representation. The first state is non-admission: if the compressed form lacks a manifest, probe, residual account, fallback path, or decode metadata, no downstream consumer should route to it. A cold-archive candidate is narrower; it may be useful for rarely read, write-once material after decode checks, but that does not make it fit for active reasoning.\n\nPreview-only compression is useful when the system needs browsing, routing, or rough inspection, but it must carry loss labels and non-claim boundaries. A task-probe-passed artifact has cleared a bounded task under a declared use envelope, so routing can use it for that task family while preserving fallback. Exact-replay-ready is stronger: decode determinism and reconstruction contracts have passed for the target, although cost can still make the full artifact the better route.\n\nNegative states matter just as much. Fallback-dominant means probe failures or decode costs make the preserved full artifact the normal path, and the failed compression attempt becomes evidence rather than shame. Decoder-quarantined means platform drift, dependency drift, floating-point differences, or manifest mismatch has broken exact decode. In both cases the architecture blocks quiet promotion and routes back to the full artifact.\n\nThese states keep WORM archive assumptions from leaking into planning, citation, audit, or benchmark contexts. A representation can be excellent for deep storage and still wrong for the next task.",
      "rationale": "Replace the artifact-compression admission-state table with reader prose while preserving the canonical AI/research state taxonomy."
    },
    {
      "id": "v1_0.readiness.minimum_viable_implementation_reader_replace",
      "target_file": "chapters/readiness-gates-residual-escrow-and-quarantine.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The smallest useful readiness layer is a record plus a replayable fixture suite. The record names the target, the workload family, the authority envelope, the current lifecycle state, the evidence used, the residuals that survived, the routes that are allowed or blocked, the fallback path, and the expiry condition.\n\nThe existing `readiness_gate_record` schema checks that those fields are present. Passing schema validation does not mean a module is ready. It means the readiness decision has enough shape for reviewers, routers, benchmark ratchets, and replacement transactions to inspect what was claimed and what remained unresolved.\n\nThe older readiness/residual gate harness checks cross-record consistency across costed routes, readiness gates, and replacement transactions. It exercises canary and default scenarios, residual custody, quarantine, expired evidence, fallback paths, and rollback-readiness links. The newer readiness lifecycle probe focuses on the state machine itself: six valid synthetic lifecycle moves and twelve invalid controls for non-forward jumps, missing evidence, missing residual escrow, unsafe default readiness, quarantine leakage, missing terminal records, retired-state reuse, missing non-claims, and support-promotion overclaim.\n\n`AsiStackProofs.ReadinessGates` models the same boundary with finite predicates and a fixture-summary bridge. It checks promoted decisions, quarantine routing, stale-gate reuse, default readiness, supersession, retirement, retired-state closure, and the lifecycle-probe summary. That is useful record discipline, not deployed readiness behavior. It does not prove benchmark quality, residual-ledger storage, lifecycle execution, live routing enforcement, terminal-state governance, MoECOT replay, or support-state promotion.",
      "rationale": "Replace the dense readiness harness inventory with reader prose while preserving the canonical AI/research proof, probe, and no-promotion boundaries."
    },
    {
      "id": "v1_0.resource_economics.minimum_viable_implementation_reader_replace",
      "target_file": "chapters/resource-economics-and-token-budgets.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The smallest honest implementation is not a market, scheduler, or TokenMana simulation. It is a Resource Budget Record paired with the evidence records that say what a route was allowed to mean.\n\nThat record has to price the whole route before calling anything efficient: task value, risk class, capacity pool, cost estimate, verification tax, protected overhead, displaced costs, quality predicate, safety gates, escalation rule, residuals, and evidence references. When synthetic or simulated evidence is involved, a Simulation Contract Record has to travel with it so scope, fidelity, omissions, instrumentation effects, resource bills, and transfer limits stay attached.\n\nThe current repository has a deliberately narrow version of that idea. The budget fixtures and ledger checks accept low-risk dispatch, high-risk escalation, protected-overhead dispatch, displaced-cost residualization, review-capacity hoarding detection, and security-overhead erasure rejection. The simulation-transfer checks accept only scoped claim movement and reject missing fidelity, unbounded world transfer, missing resource bills, ignored instrumentation, and support-state promotion.\n\nThe flagship Resource lane then makes the accounting concrete. Its costed-route slice compares four routes: an adequate but expensive manual-review baseline, a bounded transform route with verification, a cheaper route that fails verification, and a cheaper route that hides residual cost. The accepted slice chooses the bounded transform route only after the cheaper failed and hidden-residual routes are rejected. The Lean bridge checks the same finite selector state rather than asking the reader to trust the prose.\n\nThe workflow and load-stability fixtures add route history. The workflow trace keeps high-risk release work ahead of lower-risk work and preserves protected overhead, residual ownership, and non-claim boundaries. The finite load-stability probe selects protected capacity smoothing over admitting every arrival in a 10-task synthetic burst, while residualizing seven deferrals and rejecting review erasure.\n\nThe aggregate replay ties the local evidence package together: `python3 scripts/validate_resource_flagship_lane.py` checks ten command replays, twenty-six tracked artifact digests, three accepted narrow transitions, five explicit no-promotion decisions, preserved negative controls, residuals, non-claims, and the no-core-promotion boundary. The CI cost profile adds publication-pipeline metadata, including classified deploy-service failures and a recorded recovery boundary, but it remains operations metadata rather than workload evidence.\n\nThe governance-tax model supplies the reader-facing trade-off. Two modeled cases choose governance once hidden verification, fallback, reviewer burden, and residual discharge are priced. One low-risk shortcut remains allowed because no protected gate is required and the full cost stays lower. This is the point of resource economics: governed efficiency is neither always-pay-every-tax nor always-take-the-cheapest-route. It is the discipline of pricing the whole route before accepting the saving.\n\nNone of this proves deployed scheduler behavior, real verification-tax measurement, stable speedup, TokenMana or PlanForge behavior, model quality, economic optimality, physical feasibility, external review, artifact approval, support-state movement, or the Resource Economics core claim. It is a public-safe minimum slice for one narrower claim: a route is not cheaper when the savings come from erased verification, erased protected overhead, or displaced residual burden.",
      "rationale": "Replace the reader-visible harness inventory with prose that explains the Resource Economics minimum artifact while preserving no-deployed-scheduler and no-promotion boundaries."
    },
    {
      "id": "v1_0.routing_heads.interfaces_reader_replace",
      "target_file": "chapters/routing-heads-and-specialist-cores.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Interfaces",
        "aliases": []
      },
      "content": "The reader-facing routing interface has three linked records. The first is the specialist registry entry: it says what a specialist can do, who owns it, which memory and tools it may lease, what authority ceiling it has, what it costs, how ready it is, where it should fall back, and which limitations and non-claims travel with it. A specialist is therefore not just a name in a tool list. It is a bounded capability card.\n\nThe second record is the route decision. It names the task, the candidate specialists, the selected specialist, the rejected candidates, the reason for non-selection, the route shape, the granted authority subset, denied authority, context lease, tool lease, verifier requirement, budget, expiry, fallback route, residual owner, ledgers, and non-claims. The important point is that the route explains both the yes and the no. A route that cannot reconstruct why stronger, cheaper, broader, or stale specialists were rejected is not yet governable.\n\nThe third record is the MoECOT-style orchestration packet. Its role is not to make a runtime brand authoritative. It keeps command intake, route-head choice, specialist lanes, control-plane gates, authority ledgers, readiness gates, replay references, denied routes, failed gates, missing replay references, handoffs, promotion blockers, residuals, and source-claim state visible in one packet.\n\nPlanning should request capabilities, governance should grant only the task-local authority subset, execution should receive the selected route and its limits, and artifact graphs should preserve the route receipt for later claims. These records do not prove route quality or runtime behavior. They preserve the evidence future route-quality, replay, and runtime tests would need.",
      "rationale": "Replace the specialist-registry, routing-decision, and MoECOT field catalogs with reader prose while preserving the canonical AI/research schemas in the live chapter."
    },
    {
      "id": "v1_0.runtime_adapters.effect_receipt_reader_replace",
      "target_file": "chapters/runtime-adapters-tool-permissions-and-human-approval.qmd",
      "action": "replace_section",
      "section": {
        "level": 3,
        "title": "Effect receipt fields",
        "aliases": []
      },
      "content": "An effect receipt exists to keep a successful tool response from turning into a broad success claim. It names the state before the effect when that state is available, then names the state after the effect so review can see what changed. External side effects are recorded separately because messages, deployments, payments, API calls, hardware actions, and institutional changes may need different rollback and incident paths.\n\nRollback handles name the actual mechanism for undoing or repairing an effect when such a mechanism exists. Irreversible residuals name what cannot be undone. Verification references point to checks that the effect matched the contract, while incident references point to denials, exceptions, partial failures, or later reviews.\n\nThe receipt therefore separates evidence of invocation from evidence of correctness. A tool may respond successfully while verification, rollback, approval scope, or residual accounting remains incomplete.",
      "rationale": "Replace the effect-receipt field table with reader prose while preserving the canonical AI/research receipt-field matrix."
    },
    {
      "id": "v1_0.runtime_adapters.minimum_viable_implementation_reader_replace",
      "target_file": "chapters/runtime-adapters-tool-permissions-and-human-approval.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The smallest honest version is a permission envelope around one narrow action. The adapter record says which job requested the action, which capability was needed, which approval or lease applied, what changed, what could be rolled back, and which residuals remain.\n\nThe current repo has three public pieces. The synthetic permission harness checks two valid adapter scenarios and seven invalid ones, including missing permission, approval bypass, expired approval, missing receipts, irreversible effects without rollback or residuals, ambient-authority substitution, and revoked authority receipts. The Lean module models the same finite boundary: permission, scoped leases, sandbox status, authority ceilings, confused-deputy rejection, sandbox-escape rejection, rollback obligations, effect receipts, replay, adversarial review, and revocation routing.\n\nThere is also one tiny executable trace. The effect replay probe writes a generated public-safe temporary file outside the repo, records pre-state and post-state digests, restores the exact pre-state digest, and rejects missing-permission and expired-approval controls before mutation. The adversarial boundary probe adds two valid synthetic reviews and twelve invalid controls for parentage, authority, approval, sandbox, secret, rollback, receipt, audit, support-state, and non-claim failures.\n\nThat is useful boundary evidence, not deployed adapter safety. It does not prove a production sandbox, approval service, secret-handle broker, revocation service, policy-enforcement layer, rollback service, benchmark, or support-state transition.",
      "rationale": "Replace the dense runtime-adapter harness inventory with reader prose while preserving the canonical AI/research proof and probe details."
    },
    {
      "id": "v1_0.spinoza.interfaces_reader_replace",
      "target_file": "chapters/spinoza-verification-and-proof-carrying-claims.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Interfaces",
        "aliases": []
      },
      "content": "This layer sits between durable claims and downstream action. Claim ledgers supply the stable claim identity, support state, provenance, contradictions, revision history, and promotion blockers. Spinoza-style verification does not replace that ledger; it writes bounded verification outcomes back to it.\n\nVCM and semantic context cells supply the source and evidence objects that proof, citation, and tribunal records point to. That pointer is useful only when it preserves the boundary: a source reference or context cell is not the same thing as verification success. Verification Bandwidth handles a different question: whether the available context and reviewer capacity are adequate for the risk carried by the claim.\n\nFormal and executable artifacts can enter when the claim type permits them. Lean proofs, GenesisCode-style obligations, Circle-style contracts, procedure logs, replay logs, and benchmark artifacts can support narrow checks, but each artifact needs its own scope, limitations, failed attempts, and non-claims. UAT-style tribunal review handles contested, high-risk, or mismatched cases by recording dossiers, reviewer roles, adversarial probes, dissent, verdicts, required actions, and residuals.\n\nThe field lists in the live research chapter name those records precisely. At reader level, the important idea is simpler: a proof-carrying claim record must say which claim was checked, what tier was requested, what artifact or dossier was used, how the human-language claim was mapped to that artifact, what the verifier or tribunal returned, what failed, what remains out of scope, and what ledger effect is allowed. A tribunal record must say what was reviewed, what evidence boundary was used, who or what played which review role, what challenges were run, what dissent survived, which verdict was issued, and what action or constraint follows.\n\nPlanning and execution consume those outcomes as blockers, constraints, required actions, authority narrowing, human sign-off, or residual work. They do not receive an invisible support-state promotion. That boundary is the point of the interface: stronger claims can ask for stronger records, but every pass, failure, timeout, mismatch, dissent, and verdict returns with an explicit limit.",
      "rationale": "Replace the generated-reader proof-carrying and tribunal field table with prose while preserving claim-ledger, VCM, verification-bandwidth, proof-artifact, tribunal, planning, and execution handoffs."
    },
    {
      "id": "v1_0.spinoza.minimum_viable_reader_replace",
      "target_file": "chapters/spinoza-verification-and-proof-carrying-claims.qmd",
      "action": "replace_section",
      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The minimum viable implementation is a record discipline, not an open-domain verifier or a working tribunal. It needs enough structure to represent a verification event, reject obvious laundering, preserve failed attempts, and write only bounded effects back to the claim ledger.\n\nThe current slice uses proof-carrying-claim, tribunal-review, claim-record, and belief-revision schemas. Its proof-carrying fixtures include a valid narrow formal pass, a citation dossier that makes no support change, and a mismatch that escalates. The invalid controls reject passed verifier records without artifact references, mismatches that try to promote, formal tiers backed by the wrong justification type, timeouts that overpromote support, and negative evidence without a failed-attempt record.\n\nThe tribunal fixtures cover scoped acceptance with constraints, unchanged evidence that remains blocked, and high-risk revision with dissent preserved. Their invalid controls reject acceptance without evidence, high-risk review without adversarial probes, prior-review laundering, dissent that does not preserve an unresolved issue, and weak non-claim boundaries.\n\nThe adversarial review dossier probe adds a bounded synthetic slice: two valid review dossiers and seven expected-invalid controls. It is useful because it exercises the record shape and laundering defenses. It does not prove semantic equivalence, reviewer independence, adversarial-probe quality, verdict correctness, LLM-judge quality, debate-system quality, deployed review behavior, or support-state movement.",

        "level": 3,
        "title": "Permission classes",
        "aliases": []
      },
      "content": "The authority record has to name the kind of permission being requested, because the same information can be safe in one permission class and unsafe in another. Reading a source, transforming it into a summary, disclosing it to an audience, writing it into a durable artifact, executing a tool, and approving a high-impact action are different powers. A system that collapses them into a generic access flag has already lost the boundary it needs to enforce.\n\nRead permission lets a layer inspect material without publishing it, mutating it, or acting on it. Transform permission lets a layer derive a new artifact, but it carries provenance and taint obligations. Disclosure permission asks whether the output may be shown, exported, or transmitted to the intended audience. Write permission changes a file, ledger, memory cell, branch, or other durable target and therefore needs target-scoped authority plus audit. Execute permission crosses into a tool, runtime, service, or adapter and should leave an effect receipt. Approval permission is still more constrained: it authorizes a promotion or high-impact action and cannot be self-issued by the actor that benefits from it.\n\nThese classes are deliberately ordinary. Most failures at this layer are ordinary too: a model reads something and treats the text as approval, a planner turns a draft into an action, a tool wrapper lets a low-authority request borrow a broader credential, or a replacement implementation inherits a handle that was qualified for an earlier context. The point of the taxonomy is to make those mistakes visible before they become side effects.",

      "section": {
        "level": 2,
        "title": "Minimum Viable Implementation",
        "aliases": []
      },
      "content": "The smallest useful artifact is an authority-transition record with a few deliberately sharp cases. One valid handoff should show a principal asking for an operation, matching the permission class, staying within the caller ceiling, presenting an active grant, producing the required receipt, and leaving audit references and non-claims behind. The denied cases matter just as much: missing authority, over-ceiling delegation, permission collapse, missing receipts, stale grants, and confused-deputy attempts should stop before any downstream layer treats the request as executable.\n\nThe first local harness keeps that boundary narrow. It rejects records that allow authority above the caller ceiling, omit the receipt for an effect, or treat disclosure as mere read access. It also preserves denial reasons so later planning cannot reinterpret missing authority as missing context.\n\nThat slice is intentionally not enforcement evidence. It shows that the record shape can represent allowed handoff, denial, escalation, missing receipt, permission collapse, and confused-deputy cases. Stronger support would require live adapter traces, deployed denial paths, revocation propagation, tool-call enforcement, and adversarial probes.",

      "section": {
        "level": 3,
        "title": "Route outcome states",
        "aliases": []
      },
      "content": "The route ledger gives efficiency a set of outcome states so useful work, efficient work, brittle work, hidden-cost work, and unsafe work do not collapse into the same success label. An adequate minimum route is the strong case: the selected route satisfied the predicate, lower-cost authorized candidates were absent or failed, and the residuals were recorded. That result can become a candidate for a tool, memory, regression, or capability field, but only as a candidate.\n\nAdequate overkill is still useful, but it is not an efficiency result because the lower-cost route was not examined or recorded. Cheap brittle routes are the inverse: they save visible cost while failing quality, verification, or residual checks, so they create escrow and fallback work. Hidden-cost routes pass only because repair, verification, context, or human review was left outside the bill. Unsafe savings are blocked outright because they bypass authority, approval, verification, or rollback.\n\nThese are accounting states, not benchmark results. They let a future implementation say that a route produced value without pretending it was efficient, or say that it saved cost only after the work that made it safe enough to use is visible in the same record.",
      "rationale": "Replace the route-outcome state table with reader prose while preserving the canonical AI/research efficiency-accounting matrix."

    {
      "id": "v1_0.verification_bandwidth.adequacy_states_reader_replace",
      "target_file": "chapters/verification-bandwidth-and-context-adequacy.qmd",

      "section": {
        "level": 3,
        "title": "Adequacy states",
        "aliases": []
      },
      "content": "Adequacy states give the system a public way to refuse overconfident prose. If required source units are absent, the system has no basis for a source-derived claim. If the packet is drafting-only, it may help write, orient, or assemble a source queue, but it cannot verify the target claim. A local check is narrower still: a citation, schema, fact, or consistency relation may have been checked without proving the broader claim.\n\nJoint check is the first state that can plausibly support a stronger move, because the required semantic units were compared in the declared mode. Even then, support promotion still depends on the other evidence gates. Summary-derived context carries an explicit ceiling: a compressed packet or summary may be useful, but the claim cannot outrun the known loss and residuals. Escalated context is an honest stop sign, routing the claim to retrieval, split review, tribunal, proof, or human review until stronger evidence returns.\n\nContradicted is not a minor confidence adjustment. It means the adequacy pass found a conflict that matters to the target claim, so the claim needs revision, downgrade, refutation, or residual preservation. These states do not measure a model's hidden attention. They give the stack a visible vocabulary for saying which use the loaded context can honestly support.",

      "id": "v1_0.virtual_context_abi.representation_examples_reader_replace",

      "section": {
        "level": 3,
        "title": "Representation examples",
        "aliases": []
      },
      "content": "The same source can honestly appear in several forms, and each form carries a different permission boundary. An exact excerpt can support citation review, quote checking, or contradiction work, but it cannot be shown where clearance or authority forbids the underlying source. A lossy planning summary can orient a planner and expose dependencies, but it cannot become proof, citation, or support-state promotion.\n\nA redacted execution packet can tell a worker what to do under a narrower disclosure rule, but it is not the full source and does not broaden the worker's authority. A claim or contradiction cell can enter the claim ledger for review and belief revision, but the support state still belongs to the claim ledger rather than to the certificate by itself. A reader-facing paraphrase can help a human understand the argument, but it cannot become source evidence or proof support.\n\nThose examples are design semantics only. They show why the ABI needs typed representations and certificates; they do not show that a summary-fidelity checker, deployed VCM service, or model-facing memory system exists.",

    {
      "id": "v1_0.virtual_context_abi.interfaces_reader_replace",
      "target_file": "chapters/virtual-context-abi.qmd",

      "section": {
        "level": 2,
        "title": "Interfaces",
        "aliases": []
      },
      "content": "Planning asks for context by task, address, authority, representation need, and adequacy target. It should receive enough structure to know whether the returned object is a constraint, claim, decision, source excerpt, summary, or residual. VCM owns the materialization boundary: address, version, certificate, source reference, authority, loss, permitted use, lease, residual, and fault state.\n\nClaim ledgers and Spinoza-style review can consume claim and evidence cells, but a certificate does not settle the claim. Support state, contradiction, revision, and promotion remain claim-ledger decisions. Execution consumes only permitted representations; a redacted execution packet may guide work without exposing the broader source or expanding authority.\n\nArtifact graphs store certificate references when context-derived representations become durable work products, so a later audit can recover which context object influenced an artifact. Context transactions handle the dynamic memory semantics that this static ABI does not own: snapshot consistency, branch isolation, mount permissions, taint propagation, deletion closure, and declassification. Verification bandwidth handles the adequacy question: a packet can be validly admitted and still be too weak for a high-risk claim.\n\nThe minimum ABI record therefore needs identifiers and boundaries such as `request_id`, `task_id`, `semantic_address`, `version`, `mount`, `snapshot_id`, `representation_contract`, `authority_ceiling`, `admission_state`, `adequacy_state`, `fault_state`, `materialization_ref`, `lease_expiry`, `source_refs`, `residuals`, `audit_refs`, and `non_claims`. The matching semantic page certificate needs the cell identity and derivation fields: `page_id`, `cell_type`, `source_bindings`, `derived_from`, `transaction_refs`, `artifact_refs`, `representation_kind`, `loss_contract`, `omissions`, `authority_ceiling`, `permitted_uses`, `validity_window`, `verification_state`, `revocation_state`, `residual_risks`, and `non_claims`.\n\nThose fields make the handoffs inspectable, but they still do not prove resolver correctness, certificate truthfulness, transaction isolation, deletion enforcement, model-facing context quality, leak prevention, or VCM-Bench behavior.",
