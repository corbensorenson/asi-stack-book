<a class="asi-skip-link" href="#quarto-document-content">Skip to main content</a>
<script>
  (() => {
    const skipLink = document.querySelector(".asi-skip-link");
    if (skipLink && document.body && document.body.firstElementChild !== skipLink) {
      document.body.prepend(skipLink);
    }
    const labelSearchInputs = () => {
      document.querySelectorAll(".aa-Input, input[type='search']").forEach((input) => {
        const labelledBy = input.getAttribute("aria-labelledby") || "";
        const labelledText = labelledBy
          .split(/\s+/)
          .map((id) => document.getElementById(id)?.textContent?.trim() || "")
          .filter(Boolean)
          .join(" ");
        const hasName =
          input.getAttribute("aria-label") ||
          labelledText ||
          input.getAttribute("title") ||
          input.getAttribute("placeholder");
        if (!hasName) {
          const labelTarget = labelledBy ? document.getElementById(labelledBy.split(/\s+/)[0]) : null;
          if (labelTarget) labelTarget.textContent = "Search this book";
          input.setAttribute("aria-label", "Search this book");
        }
      });
    };
    labelSearchInputs();
    new MutationObserver(labelSearchInputs).observe(document.documentElement, {
      childList: true,
      subtree: true
    });
  })();
</script>
<script>
  (() => {
    const referenceAttributes = [
      "href", "xlink:href", "fill", "stroke", "filter", "clip-path",
      "mask", "marker-start", "marker-mid", "marker-end",
      "aria-labelledby", "aria-describedby", "style"
    ];
    const namespaceSvgIds = () => {
      document.querySelectorAll("svg:not([data-asi-ids-namespaced])").forEach((svg, svgIndex) => {
        const map = new Map();
        const prefix = `asi-svg-${svgIndex}-${Math.random().toString(36).slice(2, 8)}-`;
        svg.querySelectorAll("[id]").forEach((node) => {
          const oldId = node.id;
          const newId = `${prefix}${oldId}`;
          map.set(oldId, newId);
          node.id = newId;
        });
        if (map.size) {
          svg.querySelectorAll("*").forEach((node) => {
            referenceAttributes.forEach((name) => {
              const value = node.getAttribute(name);
              if (!value) return;
              let updated = value;
              map.forEach((newId, oldId) => {
                updated = updated
                  .replaceAll(`url(#${oldId})`, `url(#${newId})`)
                  .replaceAll(`#${oldId}`, `#${newId}`);
              });
              if (updated !== value) node.setAttribute(name, updated);
            });
          });
        }
        svg.setAttribute("data-asi-ids-namespaced", "true");
      });
    };
    let queued = false;
    const queueNamespace = () => {
      if (queued) return;
      queued = true;
      requestAnimationFrame(() => {
        queued = false;
        namespaceSvgIds();
      });
    };
    queueNamespace();
    window.addEventListener("load", queueNamespace, { once: true });
    new MutationObserver(queueNamespace).observe(document.documentElement, {
      childList: true,
      subtree: true
    });
  })();
</script>
