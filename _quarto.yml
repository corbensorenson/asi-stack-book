        - chapters/reasoning-verification-and-epistemology.qmd
        - chapters/routing-and-modular-intelligence.qmd
        - chapters/compression-and-representation.qmd
        - chapters/mathematical-and-search-substrates.qmd
        - chapters/evidence-benchmarks-and-ratchets.qmd
    - part: "Part III - Integration and Implementation"
