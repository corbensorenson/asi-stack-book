<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Route selection budget tradeoff draft figure</title>
  <desc id="desc">A draft systems diagram showing a costed route selector that rejects cheaper failed-verification and hidden-residual routes, keeps an adequate overkill baseline, and selects the lowest-cost eligible route without promoting chapter-core claims.</desc>
  <defs>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#256b7c"/>
    </marker>
    <marker id="arrow-rose" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8a5264"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#18202a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f7f9fb; }
      .panel { fill: #ffffff; stroke: #d8dee6; stroke-width: 2; }
      .route { fill: #f4f8fa; stroke: #256b7c; stroke-width: 2.5; }
      .selected { fill: #f2f8f5; stroke: #497b5b; stroke-width: 3; }
      .rejected { fill: #fbf3f5; stroke: #8a5264; stroke-width: 2.5; }
      .baseline { fill: #fff8f2; stroke: #a86f45; stroke-width: 2.5; }
      .gate { fill: #ffffff; stroke: #765a8a; stroke-width: 2.5; }
      .ink { fill: #18202a; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #5a6675; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 25px; font-weight: 750; }
      .small { font-size: 18px; font-weight: 650; }
      .tiny { font-size: 15px; font-weight: 550; }
      .caption { font-size: 16px; font-weight: 600; }
      .number { font-size: 23px; font-weight: 800; }
      .line { fill: none; stroke: #256b7c; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-teal); }
      .rose { fill: none; stroke: #8a5264; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-rose); }
      .dash { fill: none; stroke: #5a6675; stroke-width: 2.5; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <text class="ink label" x="58" y="62">Route Selection Budget Tradeoff</text>
  <text class="muted caption" x="58" y="92">Draft key figure from the public costed-route slice. Lowest cost wins only after eligibility gates pass.</text>

  <rect class="panel" x="54" y="132" width="226" height="144" rx="12" filter="url(#soft-shadow)"/>
  <text class="ink small" x="82" y="170">Task request</text>
  <text class="muted tiny" x="82" y="202">risk class, objective,</text>
  <text class="muted tiny" x="82" y="226">budget record, fallback,</text>
  <text class="muted tiny" x="82" y="250">residual owner</text>

  <rect class="gate" x="332" y="88" width="260" height="228" rx="12" filter="url(#soft-shadow)"/>
  <text class="ink small" x="360" y="126">Eligibility gates</text>
  <text class="muted tiny" x="360" y="158">evaluated route</text>
  <text class="muted tiny" x="360" y="182">verification pass</text>
  <text class="muted tiny" x="360" y="206">adequate outcome</text>
  <text class="muted tiny" x="360" y="230">dispatchable budget</text>
  <text class="muted tiny" x="360" y="254">fallback visible</text>
  <text class="muted tiny" x="360" y="278">residuals and non-claims</text>

  <rect class="selected" x="644" y="70" width="246" height="118" rx="12" filter="url(#soft-shadow)"/>
  <text class="ink small" x="672" y="108">Selected candidate</text>
  <text class="muted tiny" x="672" y="138">bounded transform + verifier</text>
  <text class="ink number" x="672" y="168">14.2 cost units</text>

  <rect class="baseline" x="644" y="222" width="246" height="118" rx="12"/>
  <text class="ink small" x="672" y="260">Overkill baseline</text>
  <text class="muted tiny" x="672" y="290">frontier manual review</text>
  <text class="ink number" x="672" y="320">43.0 cost units</text>

  <rect class="rejected" x="644" y="374" width="246" height="118" rx="12"/>
  <text class="ink small" x="672" y="412">Rejected cheap route</text>
  <text class="muted tiny" x="672" y="442">failed verification</text>
  <text class="ink number" x="672" y="472">2.3 cost units</text>

  <rect class="rejected" x="644" y="526" width="246" height="118" rx="12"/>
  <text class="ink small" x="672" y="564">Rejected hidden cost</text>
  <text class="muted tiny" x="672" y="594">hidden residual and handoff loss</text>
  <text class="ink number" x="672" y="624">8.2 cost units</text>

  <rect class="panel" x="952" y="104" width="190" height="168" rx="12" filter="url(#soft-shadow)"/>
  <text class="ink small" x="980" y="142">Decision</text>
  <text class="muted tiny" x="980" y="174">lowest-cost</text>
  <text class="muted tiny" x="980" y="198">eligible route</text>
  <text class="ink number" x="980" y="232">66.98%</text>
  <text class="muted tiny" x="980" y="256">synthetic cost reduction</text>

  <rect class="panel" x="952" y="356" width="190" height="178" rx="12"/>
  <text class="ink small" x="980" y="394">Boundary</text>
  <text class="muted tiny" x="980" y="426">no deployed router</text>
  <text class="muted tiny" x="980" y="450">no model quality</text>
  <text class="muted tiny" x="980" y="474">no scheduler result</text>
  <text class="muted tiny" x="980" y="498">no core promotion</text>

  <rect class="panel" x="54" y="570" width="538" height="104" rx="12"/>
  <text class="ink small" x="82" y="608">Budget rule</text>
  <text class="muted tiny" x="82" y="640">A route is not cheaper if it exports verification, fallback, residual custody, review, or non-claims.</text>
  <text class="muted tiny" x="82" y="664">Rejected routes remain evidence, because they show which shortcuts the selector refused.</text>

  <path class="line" d="M280 204 C300 204,312 204,326 204"/>
  <path class="line" d="M592 160 C612 138,624 128,638 126"/>
  <path class="line" d="M890 128 C914 128,926 174,946 188"/>
  <path class="dash" d="M890 280 C918 274,934 240,946 220"/>
  <path class="rose" d="M592 228 C616 304,622 408,638 432"/>
  <path class="rose" d="M592 258 C612 424,622 560,638 584"/>
  <path class="dash" d="M890 432 C920 432,934 432,946 432"/>
  <path class="dash" d="M890 584 C920 546,934 492,946 476"/>

  <text class="muted tiny" x="58" y="714">Status: draft visual asset; not release-reviewed. Support effect: none beyond the already recorded bounded synthetic costed-route slice.</text>
</svg>
