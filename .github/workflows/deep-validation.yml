name: Deep validation

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install pinned post-v2 evidence runtime
        run: |
          python3 -m pip install --disable-pip-version-check --no-cache-dir \
            --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python3 -m pip install --disable-pip-version-check --no-cache-dir \
            -r ci/post_v2_requirements.txt
      - name: Run deep registry tier
        env:
          PYTHONPATH: ${{ github.workspace }}/ci/linux_mlx_preflight_stubs
        run: python3 scripts/run_validation_registry.py --tier deep
