name: Build tested Pages artifact

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          version: "1.9.38"

      - name: Install Lean
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/6737edca3d2ca3dbaa1b47b87769b48b420633ae/elan-init.sh -o /tmp/elan-init.sh
          echo "a620ff1641616222c8d37c54845492004bb84d6877cdbc944dd65c1aa685bf53  /tmp/elan-init.sh" | sha256sum -c -
          sh /tmp/elan-init.sh -y --default-toolchain "$(cat lean/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Check generated scaffold
        run: |
          python3 scripts/sync_scaffold.py
          git diff --exit-code

      - name: Run deep validation tier
        run: python3 scripts/run_validation_registry.py --tier deep

      - name: Build Lean proofs
        run: cd lean && lake build

      - name: Render clean HTML
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          rm -rf _site
          quarto render --to html

      - name: Build and validate canonical public status
        run: |
          python3 scripts/build_canonical_public_status.py --output _site/status/canonical-public-status.json
          python3 scripts/build_product_projections.py --output _site/products --status _site/status/canonical-public-status.json
          python3 scripts/build_release_channels.py --site _site
          python3 scripts/validate_product_projections.py --site _site
          python3 scripts/validate_release_channels.py --site _site --require-clean
          python3 scripts/validate_public_status_consistency.py --site _site --require-clean

      - name: Validate live Human view
        run: python3 scripts/validate_live_human_view.py

      - name: Browser-smoke live Human view
        run: node scripts/validate_live_human_view_browser.js

      - name: Build and verify tested artifact
        run: |
          python3 scripts/build_tested_site_bundle.py --site _site --output build/pages-tested
          python3 scripts/validate_tested_site_bundle.py --bundle build/pages-tested --expected-commit "$GITHUB_SHA"

      - name: Upload commit-bound tested artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-tested-${{ github.sha }}
          path: build/pages-tested
          if-no-files-found: error
          retention-days: 14
