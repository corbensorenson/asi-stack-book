name: Deploy tested Quarto site

on:
  workflow_run:
    workflows: ["Build tested Pages artifact"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out tested source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Download successful tested artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pages-tested-${{ github.event.workflow_run.head_sha }}
          path: build/pages-tested
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify commit-bound artifact without rebuilding
        run: python3 scripts/validate_tested_site_bundle.py --bundle build/pages-tested --expected-commit "${{ github.event.workflow_run.head_sha }}"

      - name: Upload already-tested Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: build/pages-tested/site

      - name: Deploy already-tested artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          timeout: 600000

  attest:
    name: Attest deployed Pages site
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out tested source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Crawl deployed status and chapter graph
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python3 scripts/validate_public_status_consistency.py \
            --url "${{ needs.deploy.outputs.page_url }}" \
            --require-clean \
            --attempts 12 \
            --retry-delay 10
