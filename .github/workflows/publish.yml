name: Publish Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain "$(cat lean/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Check generated scaffold
        run: |
          python3 scripts/sync_scaffold.py
          git diff --exit-code

      - name: Validate book source
        run: |
          python3 scripts/sync_proof_manifest.py --check
          python3 scripts/validate_chapter_dod.py
          python3 scripts/validate_publication.py
          python3 scripts/validate_release_profiles.py
          python3 scripts/validate_reading_mode_toggle.py
          python3 scripts/validate_human_reading_paths.py
          python3 scripts/validate_source_appendices.py
          python3 scripts/validate_v1_status_snapshot.py
          python3 scripts/validate_outline_consistency.py
          python3 scripts/validate_reader_spine.py --check
          python3 scripts/build_reader_edition.py --check
          python3 scripts/render_reader_formats.py --check
          python3 scripts/build_audio_script.py --check
          python3 scripts/validate_book.py
          python3 scripts/validate_visual_coverage.py
          python3 scripts/validate_proof_artifact_audit.py
          python3 scripts/validate_source_evidence_audit.py
          python3 scripts/validate_schemas.py
          python3 scripts/validate_protocol_examples.py
          python3 scripts/validate_repeated_prose.py

      - name: Build Lean proofs
        run: cd lean && lake build

      - name: Render HTML
        run: quarto render --to html

      - name: Validate live Human view
        run: python3 scripts/validate_live_human_view.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
