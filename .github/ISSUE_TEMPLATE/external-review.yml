name: External review
description: Record independent review input without treating it as evidence by itself.
title: "External review: "
labels: ["external-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reviewing The ASI Stack. Review comments are review input, not source evidence, proof results, benchmark evidence, support-state promotions, or artifact approvals unless later routed through the book's evidence-transition process.
  - type: dropdown
    id: reviewer_area
    attributes:
      label: Reviewer background
      options:
        - AI safety
        - Formal methods
        - AI governance / evaluations
        - Agent systems
        - ML systems
        - Technical publishing / reader experience
        - Other
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Review scope
      description: List files, chapters, appendices, rendered pages, artifacts, or claims reviewed.
    validations:
      required: true
  - type: textarea
    id: strongest_issue
    attributes:
      label: Strongest issue
      description: Name the highest-severity correctness, novelty, evidence, proof, or readability issue you found.
    validations:
      required: true
  - type: textarea
    id: challenged_claims
    attributes:
      label: Challenged claims
      description: List any claim you think is wrong, already solved, too weakly sourced, over-framed, or not novel.
    validations:
      required: false
  - type: textarea
    id: recommended_actions
    attributes:
      label: Recommended actions
      description: Suggest sources, proofs, tests, experiments, chapter rewrites, demotions, or blockers.
    validations:
      required: true
  - type: dropdown
    id: attribution
    attributes:
      label: Attribution boundary
      options:
        - Public attributable
        - Public anonymous
        - Private / non-attributable
        - Other
    validations:
      required: true
  - type: checkboxes
    id: non_claims
    attributes:
      label: Evidence boundary
      options:
        - label: I understand this review is not itself source evidence, proof evidence, support-state promotion, or artifact approval.
          required: true
